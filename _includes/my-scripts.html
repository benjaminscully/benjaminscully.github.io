<script>
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (link && link.href &&
        link.href.startsWith('http') &&
        !link.href.startsWith(window.location.origin)) {
      e.preventDefault();
      window.open(link.href, '_blank', 'noopener,noreferrer');
    }
  });
</script>
